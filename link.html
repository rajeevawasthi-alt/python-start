<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor Tag Example</title>

    <style>
        a {
            color: blue;
            /* Default link color */
            text-decoration: none;
            /* Remove underline */
        }

        a:hover {
            color: red;
            /* Change color on hover */
            text-decoration: underline;
            /* Add underline on hover */
        }
    </style>
</head>

<body>
    <h1>Anchor Tag Examples</h1>
    <p><a href="https://www.google.com" target="_blank">Visit Google</a></p>
    <p><a href="#section1">Jump to Section 1</a></p>
    <p><a href="example.pdf" download>Download PDF</a></p>
    <p><a href="mailto:example@example.com">Send Email</a></p>
    <h2 id="section1">Section 1</h2>
    <p>This is Section 1.</p>
</body>

</html>
